version: "3.9"

services:

  bot:
    build: .
    container_name: timesheet_bot
    restart: on-failure
    entrypoint: ["/app/entrypoint.sh"]
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - MINI_APP_URL=${MINI_APP_URL}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
    volumes:
      - bot_data:/app/data
      - photo_data:/app/data/photos
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: timesheet_nginx
    restart: on-failure
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./miniapp:/usr/share/nginx/html:ro
      - ./nginx/miniapp.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot:/etc/letsencrypt:ro
    depends_on:
      bot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot
    container_name: timesheet_certbot
    volumes:
      - ./certbot:/etc/letsencrypt
      - ./miniapp:/usr/share/nginx/html:ro
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /usr/share/nginx/html --quiet; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx

volumes:
  bot_data:
  photo_data:
