<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Табель</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181b24;
    --surface2: #222632;
    --border: #2d3142;
    --accent: #5b8def;
    --accent-dim: #3a6bc5;
    --text: #e4e7ed;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
    --red: #ef4444;
    --orange: #f59e0b;
    --green: #34d399;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 80px;
  }

  /* ── Header ── */
  .header {
    padding: 20px 16px 0;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .brand {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .month-total {
    text-align: right;
  }

  .month-total .hours {
    font-family: 'Unbounded', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .month-total .label {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ── Month nav ── */
  .month-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .month-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
  }
  .month-btn:active { background: var(--surface2); transform: scale(0.95); }

  .month-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    text-align: center;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 12px 16px 0;
  }

  .tab {
    flex: 1;
    padding: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  /* ── Content ── */
  .content { padding: 12px 16px 0; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Calendar ── */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-top: 8px;
  }

  .cal-dow {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    padding: 4px 0;
  }

  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.today { border-color: var(--accent); }
  .cal-day.has-entry { background: var(--surface2); }
  .cal-day.has-entry::after {
    content: '';
    position: absolute;
    bottom: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }
  .cal-day.future { opacity: 0.3; cursor: default; }
  .cal-day:not(.empty):not(.future):active { transform: scale(0.92); }

  .cal-day .day-num {
    font-size: 12px;
    font-weight: 500;
    line-height: 1;
  }

  .cal-day .day-hrs {
    font-size: 9px;
    color: var(--accent);
    line-height: 1;
    margin-top: 2px;
  }

  .cal-day.today .day-num { color: var(--accent); font-weight: 800; }

  /* Weekend tint */
  .cal-day.weekend:not(.has-entry) { background: rgba(255,255,255,0.02); }

  /* ── Entry form ── */
  .entry-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-top: 12px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-date {
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
  }

  .form-row {
    margin-bottom: 12px;
  }

  .form-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  /* Hours input */
  .hours-picker {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hours-stepper {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .step-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
  }
  .step-btn:active { background: var(--border); }

  .hours-val {
    font-family: 'Unbounded', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    min-width: 52px;
    text-align: center;
  }

  .quick-hours {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .qh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 5px 10px;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .qh-btn:active, .qh-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .note-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
    min-height: 72px;
  }
  .note-input:focus { border-color: var(--accent); }
  .note-input::placeholder { color: var(--text-muted); }

  .save-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 800;
    padding: 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .save-btn:active { transform: scale(0.98); opacity: 0.9; }

  .delete-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--red);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 10px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .delete-btn:active { background: rgba(255,77,77,0.1); }

  /* ── Shift picker ── */
  .shift-picker {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .shift-inputs {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .time-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px;
    padding: 8px 12px;
    outline: none;
    width: 130px;
    transition: border-color 0.15s;
  }
  .time-input:focus { border-color: var(--accent); }
  .time-input::-webkit-calendar-picker-indicator { filter: invert(1); }

  .shift-dash {
    color: var(--text-muted);
    font-size: 16px;
  }

  .shift-result {
    font-family: 'Unbounded', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    text-align: center;
  }

  .project-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .project-input:focus { border-color: var(--accent); }
  .project-input::placeholder { color: var(--text-muted); }
  .project-input::-webkit-search-cancel-button { display: none; }
  .project-input::-webkit-search-decoration { display: none; }

  .ru-toggle {
    display: inline-block;
    margin-top: 4px;
    padding: 2px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    font-size: 11px;
    cursor: pointer;
    user-select: none;
  }

  .ru-keyboard {
    margin-top: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 4px;
    position: relative;
  }

  .ru-row {
    display: flex;
    justify-content: center;
    gap: 3px;
    margin-bottom: 3px;
  }

  .ru-key {
    min-width: 26px;
    height: 30px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 14px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ru-key:active { background: var(--accent); color: var(--bg); }

  .ru-key-close {
    position: absolute;
    top: 4px;
    right: 6px;
    min-width: 22px;
    height: 22px;
    font-size: 11px;
  }

  .payment-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'Unbounded', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 8px 12px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .payment-input:focus { border-color: var(--accent); }
  .payment-input::placeholder { color: var(--text-muted); font-weight: 400; font-size: 13px; }

  /* ── Log panel ── */
  .log-list { margin-top: 8px; }

  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .log-item:active { border-color: var(--accent); }

  .log-date {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 54px;
  }

  .log-hrs {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    min-width: 44px;
  }

  .log-hrs span { font-size: 10px; font-weight: 400; color: var(--text-muted); }

  .log-note {
    font-size: 12px;
    color: var(--text-dim);
    flex: 1;
    margin-top: 2px;
    line-height: 1.4;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .empty-state .icon { font-size: 36px; margin-bottom: 10px; }

  /* ── Stats panel ── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }

  .stat-card.full { grid-column: span 2; }

  .stat-val {
    font-family: 'Unbounded', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .week-chart {
    margin-top: 16px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    align-items: end;
    height: 80px;
  }

  .wc-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }

  .wc-bar {
    width: 100%;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    opacity: 0.85;
    min-height: 3px;
    transition: height 0.4s cubic-bezier(.34,1.56,.64,1);
  }

  .wc-label {
    font-size: 9px;
    color: var(--text-muted);
    text-align: center;
  }

  .streak-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .streak-icon { font-size: 20px; }
  .streak-text { font-size: 13px; color: var(--text-dim); }
  .streak-text strong { color: var(--text); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #000;
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Bottom bar ── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 12px 16px;
    background: linear-gradient(to top, var(--bg) 80%, transparent);
    padding-top: 20px;
  }

  .today-quick {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .today-quick:active { border-color: var(--accent); }
  .today-quick .tq-icon { font-size: 18px; }
  .today-quick .tq-text { flex: 1; font-size: 12px; color: var(--text-dim); }
  .today-quick .tq-today { font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 700; color: var(--accent); }

</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">⏱ Табель</div>
    <div class="month-total">
      <div class="hours" id="monthTotal">0</div>
      <div class="label">часов в месяце</div>
    </div>
  </div>
  <div class="month-nav">
    <button class="month-btn" id="prevMonth">‹</button>
    <div class="month-label" id="monthLabel">–</div>
    <button class="month-btn" id="nextMonth">›</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="calendar">Календарь</button>
  <button class="tab" data-tab="log">Журнал</button>
  <button class="tab" data-tab="budget">Бюджет</button>
  <button class="tab" data-tab="stats">Статистика</button>
</div>

<div class="content">

  <!-- ── Calendar panel ── -->
  <div class="panel active" id="panel-calendar">
    <div class="cal-grid" id="calGrid"></div>
    <div id="entryForm"></div>
  </div>

  <!-- ── Log panel ── -->
  <div class="panel" id="panel-log">
    <div class="log-list" id="logList"></div>
  </div>

  <!-- ── Budget panel ── -->
  <div class="panel" id="panel-budget">
    <div id="budgetGrid"></div>
  </div>

  <!-- ── Stats panel ── -->
  <div class="panel" id="panel-stats">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="week-chart" id="weekChart"></div>
    <div id="streakRow"></div>
  </div>

</div>

<!-- Quick "add today" button (shown when no form open) -->
<div class="bottom-bar" id="bottomBar">
  <div class="today-quick" id="todayQuick">
    <span class="tq-icon">✏️</span>
    <span class="tq-text">Записать рабочий день</span>
    <span class="tq-today" id="todayLabel">–</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Telegram WebApp init ────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0f1117');
  tg.setBackgroundColor('#0f1117');
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── State ───────────────────────────────────────────────────────────────────
let currentMonth;
let entries = {};
let incomeList = [];
let selectedDate = null;
let currentTab = 'calendar';
let resolvedUserId = null;

const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                   'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS_RU = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

// ── API ─────────────────────────────────────────────────────────────────────
const API_BASE = window.location.origin + '/api';

function getTelegramUserId() {
  if (resolvedUserId) return resolvedUserId;
  const urlParams = new URLSearchParams(window.location.search);
  const urlUid = urlParams.get('uid');
  if (urlUid) { resolvedUserId = parseInt(urlUid); localStorage.setItem('tg_user_id', String(resolvedUserId)); return resolvedUserId; }
  if (tg?.initDataUnsafe?.user?.id) { resolvedUserId = tg.initDataUnsafe.user.id; return resolvedUserId; }
  if (tg?.initData) {
    try {
      const params = new URLSearchParams(tg.initData);
      const userJson = params.get('user');
      if (userJson) { resolvedUserId = JSON.parse(userJson).id; return resolvedUserId; }
    } catch {}
  }
  const stored = localStorage.getItem('tg_user_id');
  if (stored) { resolvedUserId = parseInt(stored); return resolvedUserId; }
  return null;
}

function apiAuthQuery() {
  const params = new URLSearchParams();
  if (tg?.initData) params.set('init_data', tg.initData);
  const uid = getTelegramUserId();
  if (uid) params.set('user_id', String(uid));
  if (!uid) {
    const stored = localStorage.getItem('tg_user_id');
    if (stored) params.set('user_id', stored);
  }
  return params.toString();
}

function apiHeaders() {
  const h = {'Content-Type': 'application/json'};
  if (tg?.initData) h['X-Telegram-Init-Data'] = tg.initData;
  const uid = getTelegramUserId();
  if (uid) {
    h['X-Telegram-User-Id'] = String(uid);
    localStorage.setItem('tg_user_id', String(uid));
  }
  const stored = localStorage.getItem('tg_user_id');
  if (stored && !uid) h['X-Telegram-User-Id'] = stored;
  return h;
}

async function apiGetEntries() {
  try {
    const resp = await fetch(`${API_BASE}/entries?${apiAuthQuery()}`, {headers: apiHeaders()});
    if (!resp.ok) return null;
    return await resp.json();
  } catch { return null; }
}

async function apiSaveEntry(dateStr, hours, note, project, startTime, endTime, payment) {
  try {
    const resp = await fetch(`${API_BASE}/entry`, {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify({date: dateStr, hours, note: note || '', project: project || '', start_time: startTime || '', end_time: endTime || '', payment: payment || 0})
    });
    return resp.ok;
  } catch { return false; }
}

async function apiDeleteEntry(dateStr) {
  try {
    const resp = await fetch(`${API_BASE}/entry`, {
      method: 'DELETE',
      headers: apiHeaders(),
      body: JSON.stringify({date: dateStr})
    });
    return resp.ok;
  } catch { return false; }
}

async function apiGetIncome() {
  try {
    const resp = await fetch(`${API_BASE}/income?${apiAuthQuery()}`, {headers: apiHeaders()});
    if (!resp.ok) return null;
    return await resp.json();
  } catch { return null; }
}

async function apiSaveIncome(dateStr, amount, note) {
  try {
    const resp = await fetch(`${API_BASE}/income`, {
      method: 'POST',
      headers: apiHeaders(),
      body: JSON.stringify({date: dateStr, amount, note: note || ''})
    });
    return resp.ok;
  } catch { return false; }
}

// ── Storage ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'timesheet_v2_' + (tg?.initDataUnsafe?.user?.id || 'local');
const INCOME_KEY = 'timesheet_income_' + (tg?.initDataUnsafe?.user?.id || 'local');

function loadEntriesLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : {};
  } catch { entries = {}; }
}

function loadIncomeLocal() {
  try {
    const raw = localStorage.getItem(INCOME_KEY);
    incomeList = raw ? JSON.parse(raw) : [];
  } catch { incomeList = []; }
}

function saveIncomeLocal() {
  try {
    localStorage.setItem(INCOME_KEY, JSON.stringify(incomeList));
  } catch {}
}

function saveEntriesLocal() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  } catch {}
}

async function loadEntries() {
  const apiData = await apiGetEntries();
  if (apiData && Object.keys(apiData).length > 0) {
    entries = apiData;
    saveEntriesLocal();
  } else {
    loadEntriesLocal();
  }
  const apiIncome = await apiGetIncome();
  if (apiIncome && apiIncome.length > 0) {
    incomeList = apiIncome;
    saveIncomeLocal();
  } else {
    loadIncomeLocal();
  }
}

async function saveEntry(dateStr, hours, note, project, startTime, endTime, payment) {
  entries[dateStr] = { hours, note: note || '', project: project || '', start_time: startTime || '', end_time: endTime || '', payment: payment || 0, updated_at: new Date().toISOString() };
  saveEntriesLocal();
  await apiSaveEntry(dateStr, hours, note, project, startTime, endTime, payment);
  if (tg?.sendData) {
    tg.sendData(JSON.stringify({action: 'save_entry', date: dateStr, hours, note: note || '', project: project || '', start_time: startTime || '', end_time: endTime || '', payment: payment || 0}));
  }
}

async function deleteEntry(dateStr) {
  delete entries[dateStr];
  saveEntriesLocal();
  await apiDeleteEntry(dateStr);
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function toDateStr(year, month, day) {
  return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function today() {
  const d = new Date();
  return toDateStr(d.getFullYear(), d.getMonth(), d.getDate());
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function monthEntries(year, month) {
  const prefix = `${year}-${String(month+1).padStart(2,'0')}-`;
  return Object.entries(entries).filter(([k]) => k.startsWith(prefix));
}

// ── Calendar render ──────────────────────────────────────────────────────────
function renderCalendar() {
  const { year, month } = currentMonth;
  document.getElementById('monthLabel').textContent =
    `${MONTHS_RU[month]} ${year}`;

  const me = monthEntries(year, month);
  const totalHours = me.reduce((s, [,v]) => s + v.hours, 0);
  document.getElementById('monthTotal').textContent =
    totalHours % 1 === 0 ? totalHours : totalHours.toFixed(1);

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Day-of-week headers
  DAYS_RU.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  // First day of month (Mon=0)
  const firstDay = new Date(year, month, 1).getDay();
  const offset = (firstDay + 6) % 7; // Mon-indexed
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayStr = today();

  for (let i = 0; i < offset; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = toDateStr(year, month, d);
    const dow = (new Date(year, month, d).getDay() + 6) % 7;
    const entry = entries[dateStr];
    const isFuture = dateStr > todayStr;
    const isToday = dateStr === todayStr;
    const isWeekend = dow >= 5;

    const el = document.createElement('div');
    let cls = 'cal-day';
    if (entry) cls += ' has-entry';
    if (isToday) cls += ' today';
    if (isFuture) cls += ' future';
    if (isWeekend) cls += ' weekend';
    el.className = cls;

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = d;
    el.appendChild(num);

    if (entry) {
      const hrs = document.createElement('div');
      hrs.className = 'day-hrs';
      let label = (entry.hours % 1 === 0 ? entry.hours : entry.hours.toFixed(1)) + 'ч';
      if (entry.payment > 0) label += ' 💰';
      hrs.textContent = label;
      el.appendChild(hrs);
    }

    const dayIncome = incomeList.filter(i => i.date === dateStr);
    if (dayIncome.length > 0) {
      const sal = document.createElement('div');
      sal.className = 'day-hrs';
      sal.style.color = 'var(--green)';
      const totalIncome = dayIncome.reduce((s, i) => s + i.amount, 0);
      sal.textContent = totalIncome.toLocaleString('ru') + '₽';
      el.appendChild(sal);
    }

    if (!isFuture) {
      el.addEventListener('click', () => openEntry(dateStr));
    }

    grid.appendChild(el);
  }
}

// ── Entry form ───────────────────────────────────────────────────────────────

function calcHours(start, end) {
  if (!start || !end) return null;
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  if (isNaN(sh) || isNaN(sm) || isNaN(eh) || isNaN(em)) return null;
  const diff = (eh * 60 + em) - (sh * 60 + sm);
  if (diff <= 0) return null;
  return diff / 60;
}

function openEntry(dateStr) {
  selectedDate = dateStr;
  const existing = entries[dateStr];
  const defStart = existing?.start_time || '09:00';
  const defEnd = existing?.end_time || '18:00';
  const defHours = existing?.hours ?? 9;

  const [year, month, day] = dateStr.split('-').map(Number);
  const d = new Date(year, month-1, day);

  const form = document.getElementById('entryForm');
  form.innerHTML = `
    <div class="entry-form">
      <div class="entry-date">
        <span>${label}</span>
        <button class="close-btn" id="closeForm">×</button>
      </div>

      <div class="form-row">
        <div class="form-label">Начало и конец смены</div>
        <div class="shift-picker">
          <div class="shift-inputs">
            <input type="time" class="time-input" id="startTime" value="${defStart}">
            <span class="shift-dash">—</span>
            <input type="time" class="time-input" id="endTime" value="${defEnd}">
          </div>
          <div class="shift-result" id="shiftResult">${defHours}ч</div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-label">Проект (необязательно)</div>

          placeholder="Название проекта" value="${existing?.project || ''}">
        <div class="ru-toggle" id="ruToggleProject" data-target="projectInput">🌐 RU</div>
      </div>

      <div class="form-row">
        <div class="form-label">Оплата за смену (₽)</div>
        <input type="number" class="payment-input" id="paymentInput"
          placeholder="0" value="${existing?.payment || ''}" min="0" step="100">
      </div>

      <div class="form-row">
        <div class="form-label">Зарплата / Аванс (₽)</div>
        <input type="number" class="payment-input" id="salaryInput"
          placeholder="0" min="0" step="1000">
      </div>

      <div class="form-row">
        <div class="form-label">Заметка (необязательно)</div>
        <textarea class="note-input" id="noteInput"
          placeholder="Что делал сегодня? Задачи, встречи…">${existing?.note ?? ''}</textarea>
        <div class="ru-toggle" id="ruToggleNote" data-target="noteInput">🌐 RU</div>
      </div>

      <button class="save-btn" id="saveBtn">СОХРАНИТЬ</button>
      ${existing ? `<button class="delete-btn" id="delBtn">🗑 Удалить запись</button>` : ''}
    </div>
  `;

  document.getElementById('closeForm').onclick = () => {
    form.innerHTML = '';
    selectedDate = null;
  };

  document.querySelectorAll('.ru-toggle').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const target = document.getElementById(btn.dataset.target);
      if (!target) return;
      const popup = document.getElementById('ruKeyboard');
      if (popup) { popup.remove(); return; }
      const kb = document.createElement('div');
      kb.id = 'ruKeyboard';
      kb.className = 'ru-keyboard';
      const rows = [
        'йцукенгшщзхъ',
        'фывапролджэ',
        'ячсмитьбю'
      ];
      rows.forEach(row => {
        const r = document.createElement('div');
        r.className = 'ru-row';
        for (const ch of row) {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'ru-key';
          b.textContent = ch;
          const upper = ch.toUpperCase();
          b.onclick = (ev) => {
            ev.stopPropagation();
            const selStart = target.selectionStart;
            const v = target.value;
            target.value = v.slice(0, selStart) + upper + v.slice(target.selectionEnd);
            target.selectionStart = target.selectionEnd = selStart + 1;
            target.focus();
          };
          r.appendChild(b);
        }
        kb.appendChild(r);
      });
      const close = document.createElement('button');
      close.type = 'button';
      close.className = 'ru-key ru-key-close';
      close.textContent = '✕';
      close.onclick = () => kb.remove();
      kb.appendChild(close);
      target.parentNode.appendChild(kb);
    };
  });

  function updateShiftResult() {
    const s = document.getElementById('startTime').value;
    const e = document.getElementById('endTime').value;
    const h = calcHours(s, e);
    document.getElementById('shiftResult').textContent = h ? h.toFixed(1).replace('.0','') + 'ч' : '—';
    form.querySelectorAll('.qh-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.s === s && b.dataset.e === e);
    });
  }

  document.getElementById('startTime').oninput = updateShiftResult;
  document.getElementById('endTime').oninput = updateShiftResult;

  document.getElementById('saveBtn').onclick = async () => {
    const startTime = document.getElementById('startTime').value;
    const endTime = document.getElementById('endTime').value;
    const hours = calcHours(startTime, endTime);
    if (!hours) { showToast('Укажи правильное время'); return; }
    const projectRaw = document.getElementById('projectInput').value.trim();
    const project = projectRaw.startsWith('#') ? projectRaw.slice(1) : projectRaw;
    const note = document.getElementById('noteInput').value.trim();
    const payment = parseFloat(document.getElementById('paymentInput').value) || 0;
    const salary = parseFloat(document.getElementById('salaryInput').value) || 0;
    await saveEntry(dateStr, hours, note, project, startTime, endTime, payment);
    if (salary > 0) {
      const res = await apiSaveIncome(dateStr, salary, '');
      incomeList.push({date: dateStr, amount: salary, note: ''});
      saveIncomeLocal();
      if (res) {
        incomeList = await apiGetIncome();
        if (incomeList && incomeList.length > 0) saveIncomeLocal();
      }
    }
    form.innerHTML = '';
    selectedDate = null;
    renderAll();
    showToast('✓ Сохранено!');
    if (tg) tg.HapticFeedback?.notificationOccurred('success');
  };

  const delBtn = document.getElementById('delBtn');
  if (delBtn) {
    delBtn.onclick = async () => {
      await deleteEntry(dateStr);
      form.innerHTML = '';
      selectedDate = null;
      renderAll();
      showToast('Запись удалена');
    };
  }

  // Scroll form into view
  setTimeout(() => form.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

// ── Stats panel ──────────────────────────────────────────────────────────────
function renderStats() {
  const { year, month } = currentMonth;
  const me = monthEntries(year, month);
  const totalHours = me.reduce((s,[,v]) => s+v.hours, 0);
  const daysWorked = me.length;
  const avg = daysWorked ? (totalHours/daysWorked) : 0;
  const daysInMonth = new Date(year,month+1,0).getDate();

  // Streak
  let streak = 0;
  const todayStr = today();
  let checkDate = new Date();
  while (true) {
    const ds = toDateStr(checkDate.getFullYear(), checkDate.getMonth(), checkDate.getDate());
    if (ds > todayStr) { checkDate.setDate(checkDate.getDate()-1); continue; }
    if (entries[ds]) { streak++; checkDate.setDate(checkDate.getDate()-1); }
    else break;
  }

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${totalHours % 1 === 0 ? totalHours : totalHours.toFixed(1)}</div>
      <div class="stat-label">Всего часов</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${daysWorked}</div>
      <div class="stat-label">Рабочих дней</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${avg ? (avg % 1 === 0 ? avg : avg.toFixed(1)) : '–'}</div>
      <div class="stat-label">Среднее/день, ч</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${daysWorked}/${daysInMonth}</div>
      <div class="stat-label">Заполнено дней</div>
    </div>
  `;

  // Last 7 days chart
  const days = [];
  const now = new Date();
  for (let i=6; i>=0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate()-i);
    const ds = toDateStr(d.getFullYear(), d.getMonth(), d.getDate());
    const dn = DAYS_RU[(d.getDay()+6)%7];
    days.push({ ds, dn, hours: entries[ds]?.hours ?? 0 });
  }
  const maxH = Math.max(...days.map(d=>d.hours), 8);

  document.getElementById('weekChart').innerHTML = days.map(d => `
    <div class="wc-col">
      <div class="wc-bar" style="height:${(d.hours/maxH*64)||0}px"></div>
      <div class="wc-label">${d.dn}</div>
    </div>
  `).join('');

  document.getElementById('streakRow').innerHTML = `
    <div class="streak-row">
      <span class="streak-icon">${streak > 0 ? '🔥' : '💤'}</span>
      <span class="streak-text">Серия подряд: <strong>${streak} ${streak===1?'день':streak<5?'дня':'дней'}</strong></span>
    </div>
  `;
}

// ── Budget panel ────────────────────────────────────────────────────────────
function renderBudget() {
  const { year, month } = currentMonth;
  const me = monthEntries(year, month);
  const totalHours = me.reduce((s,[,v]) => s + v.hours, 0);
  const totalPayment = me.reduce((s,[,v]) => s + (v.payment || 0), 0);
  const monthPrefix = `${year}-${String(month+1).padStart(2,'0')}-`;
  const monthSalary = incomeList.filter(i => i.date.startsWith(monthPrefix)).reduce((s,i) => s + i.amount, 0);
  const totalAll = totalPayment + monthSalary;
  const paidDays = me.filter(([,v]) => (v.payment || 0) > 0).length;
  const unpaidDays = me.length - paidDays;

  const projectIncome = {};
  me.forEach(([,v]) => {
    const p = v.project || '—';
    projectIncome[p] = (projectIncome[p] || 0) + (v.payment || 0);
  });

  const avgPerDay = paidDays ? totalPayment / paidDays : 0;
  const avgPerHour = totalHours ? totalPayment / totalHours : 0;

  let html = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val">${totalHours.toFixed(1).replace('.0','')}</div>
        <div class="stat-label">Часов отработано</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${totalPayment.toLocaleString('ru')}₽</div>
        <div class="stat-label">За смены</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${monthSalary.toLocaleString('ru')}₽</div>
        <div class="stat-label">Зарплата</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${totalAll.toLocaleString('ru')}₽</div>
        <div class="stat-label">Итого получено</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${paidDays}</div>
        <div class="stat-label">Оплачено смен</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${unpaidDays}</div>
        <div class="stat-label">Не оплачено</div>
      </div>
    </div>`;

  const paidProjects = Object.entries(projectIncome).filter(([,v]) => v > 0).sort((a,b) => b[1] - a[1]);
  if (paidProjects.length) {
    html += `<div style="margin-top:12px"><div class="form-label">Доход по проектам</div>`;
    paidProjects.forEach(([p, v]) => {
      html += `<div class="log-item"><div class="log-hrs">${v.toLocaleString('ru')}₽</div><div class="log-note">🏷 #${escapeHtml(p)}</div></div>`;
    });
    html += `</div>`;
  }

  if (avgPerDay > 0) {
    html += `<div style="margin-top:12px"><div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${avgPerDay.toLocaleString('ru',{maximumFractionDigits:0})}₽</div><div class="stat-label">Среднее/день</div></div>
      <div class="stat-card"><div class="stat-val">${avgPerHour.toLocaleString('ru',{maximumFractionDigits:0})}₽</div><div class="stat-label">Среднее/час</div></div>
    </div></div>`;
  }

  if (!me.length) {
    html = `<div class="empty-state"><div class="icon">💰</div>Нет записей за ${MONTHS_RU[month]} ${year}</div>`;
  }

  document.getElementById('budgetGrid').innerHTML = html;
}

async function init() {

  currentMonth = { year: now.getFullYear(), month: now.getMonth() };

  const uid = getTelegramUserId();
  if (!uid) {
    const input = prompt('Введи свой Telegram ID (число).\nЕго можно узнать у @userinfobot):');
    if (input && /^\d+$/.test(input.trim())) {
      resolvedUserId = parseInt(input.trim());
      localStorage.setItem('tg_user_id', String(resolvedUserId));
    }
  }

  await loadEntries();
  updateTodayBar();
  renderAll();

  if (tg?.colorScheme === 'light') {
    document.documentElement.style.setProperty('--bg', '#f3f4f6');
    document.documentElement.style.setProperty('--surface', '#ffffff');
    document.documentElement.style.setProperty('--surface2', '#e5e7eb');
    document.documentElement.style.setProperty('--border', '#d1d5db');
    document.documentElement.style.setProperty('--text', '#1f2937');
    document.documentElement.style.setProperty('--text-muted', '#6b7280');
    document.documentElement.style.setProperty('--text-dim', '#374151');
  }
}

init();
</script>
</body>
</html>
